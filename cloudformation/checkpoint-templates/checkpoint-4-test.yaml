AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Secure Upload Pipeline - Checkpoint 4 TEST - Cognito Auth

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 128

Resources:

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: secure-upload-pipeline-test-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: secure-upload-pipeline-test-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
      CallbackURLs:
        - http://localhost
      LogoutURLs:
        - http://localhost
      SupportedIdentityProviders:
        - COGNITO

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "secure-upload-test-${AWS::AccountId}-${AWS::Region}"
      UserPoolId: !Ref UserPool

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: secure-upload-pipeline-test-api
      StageName: Prod
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  UploadBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - UploadQueuePolicy
    Properties:
      BucketName: !Sub "secure-upload-pipeline-test-uploads-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt UploadQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/
                  - Name: suffix
                    Value: .jpg
      LifecycleConfiguration:
        Rules:
          - Id: DeleteUploadsAfter7Days
            Status: Enabled
            ExpirationInDays: 7

  RecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: secure-upload-pipeline-test-records
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: image_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: image_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-created_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  UploadDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: secure-upload-pipeline-test-dlq

  UploadQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: secure-upload-pipeline-test-queue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UploadDLQ.Arn
        maxReceiveCount: 3

  UploadQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UploadQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3SendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt UploadQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:s3:::secure-upload-pipeline-test-uploads-${AWS::AccountId}-${AWS::Region}"

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: secure-upload-pipeline-test-get-upload-url
      CodeUri: ../lambda/get-upload-url/
      Handler: app.lambda_handler
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref UploadBucket
          RECORDS_TABLE: !Ref RecordsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${UploadBucket.Arn}/uploads/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt RecordsTable.Arn
      Events:
        GetUploadUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /upload-url
            Method: post

  GetRecordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: secure-upload-pipeline-test-get-records
      CodeUri: ../lambda/get-records/
      Handler: app.lambda_handler
      Environment:
        Variables:
          RECORDS_TABLE: !Ref RecordsTable
          USER_INDEX_NAME: user_id-created_at-index
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !GetAtt RecordsTable.Arn
                - !Sub "${RecordsTable.Arn}/index/user_id-created_at-index"
      Events:
        GetRecordsApi:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /records
            Method: get

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: secure-upload-pipeline-test-processor
      CodeUri: ../lambda/processor/
      Handler: app.lambda_handler
      Environment:
        Variables:
          RECORDS_TABLE: !Ref RecordsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt RecordsTable.Arn
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt UploadQueue.Arn
      Events:
        UploadQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt UploadQueue.Arn
            BatchSize: 1

  GetUploadUrlLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetUploadUrlFunction}"
      RetentionInDays: 7

  GetRecordsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetRecordsFunction}"
      RetentionInDays: 7

  ProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProcessorFunction}"
      RetentionInDays: 7

Outputs:

  ApiBaseUrl:
    Description: Base API endpoint
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UploadUrlEndpoint:
    Description: Protected endpoint for creating upload URLs
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod/upload-url"

  RecordsEndpoint:
    Description: Protected endpoint for getting authenticated user's records
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod/records"

  UploadBucketName:
    Description: Private S3 upload bucket
    Value: !Ref UploadBucket

  RecordsTableName:
    Description: DynamoDB records table
    Value: !Ref RecordsTable

  UploadQueueUrl:
    Description: SQS upload queue
    Value: !Ref UploadQueue

  UploadDLQUrl:
    Description: SQS dead-letter queue
    Value: !Ref UploadDLQ

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient

  CognitoLoginDomain:
    Description: Cognito Hosted Login Domain
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"

  CognitoLoginUrl:
    Description: Cognito Hosted Login URL
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid&redirect_uri=http://localhost"
